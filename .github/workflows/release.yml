name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  # Pinned PSGallery dependency versions. Bump deliberately after review
  # (Dependabot does not cover PSGallery, so updates are manual).
  PESTER_VERSION: '5.7.1'
  PSSA_VERSION:   '1.25.0'

jobs:
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        env:
          PESTER_VERSION: ${{ env.PESTER_VERSION }}
          PSSA_VERSION:   ${{ env.PSSA_VERSION }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester           -Force -Scope CurrentUser -RequiredVersion $env:PESTER_VERSION
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -RequiredVersion $env:PSSA_VERSION

      - name: Build module (production)
        shell: pwsh
        run: |
          ./deploy.ps1 -Environment prod -SkipVersion

      - name: Run Pester tests
        shell: pwsh
        run: |
          # Get all unit test files (exclude Scenario, integration, and Integration.Tests.ps1)
          $unitTests = Get-ChildItem -Path './Tests' -Filter '*.Tests.ps1' -File |
            Where-Object { $_.Name -ne 'Integration.Tests.ps1' } |
            Select-Object -ExpandProperty FullName

          $config = New-PesterConfiguration
          $config.Run.Path = $unitTests
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'

          Invoke-Pester -Configuration $config

  publish:
    name: Publish to PSGallery
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents:     read
      id-token:     write    # needed by attest-build-provenance for OIDC
      attestations: write    # needed by attest-build-provenance to write the attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        env:
          PSSA_VERSION: ${{ env.PSSA_VERSION }}
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -RequiredVersion $env:PSSA_VERSION

      - name: Build module (production)
        shell: pwsh
        run: |
          ./deploy.ps1 -Environment prod -SkipVersion

      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path './PowerNetbox/PowerNetbox.psd1'
          Write-Host "Module: $($manifest.Name)"
          Write-Host "Version: $($manifest.Version)"
          Write-Host "Functions: $($manifest.ExportedFunctions.Count)"

      - name: Generate build provenance attestation
        # Creates a cryptographic attestation that this PowerNetbox.psd1 +
        # PowerNetbox.psm1 were built by THIS workflow run. Consumers can
        # verify via `gh attestation verify`. This is the module's sole
        # authenticity anchor — PowerNetbox is distributed unsigned on
        # PSGallery (SignPath Foundation declined the OSS application
        # 2026-04-24; see SECURITY.md Authenticity & provenance section).
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ./PowerNetbox/PowerNetbox.psd1
            ./PowerNetbox/PowerNetbox.psm1

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrEmpty($env:PSGALLERY_API_KEY)) {
              Write-Error "PSGALLERY_API_KEY secret is not set!"
              exit 1
          }

          Write-Host "Publishing module to PowerShell Gallery..." -ForegroundColor Cyan
          Publish-Module -Path './PowerNetbox' -NuGetApiKey $env:PSGALLERY_API_KEY -Verbose

          Write-Host "✅ Successfully published to PowerShell Gallery!" -ForegroundColor Green
