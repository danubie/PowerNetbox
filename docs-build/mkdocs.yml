site_name: PowerNetbox
site_description: The comprehensive PowerShell module for the NetBox REST API
site_url: https://docs.powernetbox.dev/
repo_url: https://github.com/ctrl-alt-automate/PowerNetbox
repo_name: ctrl-alt-automate/PowerNetbox
edit_uri: edit/dev/docs/

docs_dir: ../docs

exclude_docs: |
  superpowers/

plugins:
  - search
  - awesome-pages
  - macros:
      module_name: macros
      include_dir: .
      render_by_default: false
  - social:
      cards: true
      cards_layout_options:
        background_color: "#1976d2"

hooks:
  - hooks.py

theme:
  name: material

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  favicon: assets/favicon.svg

  icon:
    logo: material/server
    repo: fontawesome/brands/github

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: [docs-build/snippets]
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
